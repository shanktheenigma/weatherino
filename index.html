<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Slabo+13px&family=Vidaloka&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Weatherino</title>
  </head>
  <body>
    <div class="container">
      <nav>
        <div class="logo">Weatherino</div>
        <div class="search">
          <div class="searchBtn">
            <input
              type="search"
              name=""
              id="search"
              placeholder="Search for your city..."
            />
            <button><i class="fa-solid fa-arrow-right"></i></button>
          </div>
        </div>
        <div class="themeToggle">
          <button id="dayBtn" onclick="dayNight" class="active">Day</button>
          <button id="dayBtn" onclick="dayNight">Night</button>
        </div>
        <div class="saved"><button>☆</button></div>
      </nav>
      <div class="weatherDisplay">
        <div class="cityLine">
          <div class="cityLabel">
            <div class="city">Yangon</div>
            <div class="country">Myanmar</div>
            <div class="time">2026-3-22 2:00 AM - GMT + 6:30</div>
          </div>
          <div class="saveBtn"><button>☆</button></div>
        </div>
        <div class="weather">
          <div class="estTemp">20° <i class="fa-solid fa-cloud-sun"></i></div>
          <div class="estWeather">Estimated weather - Cloudy</div>
        </div>
        <div class="suggestionGroup">
          <div class="suggestion">Mellow day — perfect for a museum visit</div>
          <div class="suggestion">Light clothing, maybe sunglasses</div>
        </div>
        <hr />
        <div class="stats">
          <div class="stat">
            <div class="statLabel">Humidity</div>
            <div class="statEst"></div>
          </div>
          <div class="stat">
            <div class="statLabel">Feels like</div>
            <div class="statEst"></div>
          </div>
          <div class="stat">
            <div class="statLabel">Wind</div>
            <div class="statEst"></div>
          </div>
          <div class="stat">
            <div class="statLabel">Direction</div>
            <div class="statEst"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
